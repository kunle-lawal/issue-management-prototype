<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Robin — Chat notification prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    :root {
      /* Dark workspace chat palette, inspired by the screenshot */
      --bg-app:        #1f1f1f;
      --bg-sidebar:    #1f1f1f;
      --bg-content:    #1f1f1f;
      --bg-card:       #2b2b2b;
      --bg-card-hi:    #333333;
      --bg-item-hover: #2a2a2a;
      --bg-item-sel:   #2f2f2f;
      --bg-input:      #2a2a2a;
      --bg-button:     transparent;
      --bg-divider:    #3a3a3a;

      --fg-strong:     #f5f5f5;
      --fg-default:    #e6e6e6;
      --fg-muted:      #a8a8a8;
      --fg-faint:      #7a7a7a;
      --fg-link:       #8b8df0;

      --accent-warn:   #f0a35a;
      --accent-warn-bg:#3a2a18;
      --accent-good:   #5fb37c;
      --accent-good-bg:#1f3326;

      /* Robin brand gradient (original, evokes the screenshot avatar) */
      --robin-1: #ff3d8a;
      --robin-2: #b026d6;
      --robin-3: #5b1a8f;

      --radius-card: 10px;
      --radius-btn: 6px;

      --font-ui: "Segoe UI", "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-app); color: var(--fg-default); font-family: var(--font-ui); }
    button { font-family: inherit; }

    /* ---------- App shell ---------- */
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100vh;
      width: 100vw;
      min-width: 0;
      overflow: hidden;
    }

    /* ---------- Sidebar ---------- */
    .sidebar {
      background: var(--bg-sidebar);
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 18px 14px;
    }
    .sidebar-head h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      color: var(--fg-strong);
      letter-spacing: -0.01em;
    }
    .sidebar-head-actions {
      display: flex;
      gap: 4px;
    }
    .icon-btn {
      background: none;
      border: 0;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      color: var(--fg-muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .icon-btn:hover { background: var(--bg-item-hover); color: var(--fg-default); }
    .icon-btn svg { width: 18px; height: 18px; }

    .sidebar-filters {
      display: flex;
      gap: 6px;
      padding: 0 18px 12px;
    }
    .chip {
      font-size: 12.5px;
      color: var(--fg-default);
      background: #2a2a2a;
      border: 1px solid #353535;
      border-radius: 999px;
      padding: 5px 11px;
      cursor: pointer;
    }
    .chip:hover { background: #323232; }

    .sidebar-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding-bottom: 16px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 18px;
      color: var(--fg-default);
      font-size: 14px;
      cursor: pointer;
      user-select: none;
    }
    .nav-item:hover { background: var(--bg-item-hover); }
    .nav-item .nav-icon {
      width: 18px; height: 18px; color: var(--fg-muted);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .nav-section {
      padding: 12px 18px 4px;
      color: var(--fg-default);
      font-size: 13.5px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    .nav-section svg { width: 12px; height: 12px; color: var(--fg-muted); }
    .nav-section-divider {
      height: 1px;
      background: #2a2a2a;
      margin: 6px 18px 0;
    }

    .chat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 18px;
      cursor: pointer;
    }
    .chat-row:hover { background: var(--bg-item-hover); }
    .chat-row.selected { background: var(--bg-item-sel); }
    .chat-row .avatar { width: 28px; height: 28px; }
    .chat-row .name { font-size: 14px; color: var(--fg-default); }

    .pill-new {
      background: #4f4dd8;
      color: white;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 6px;
    }

    .see-all {
      color: var(--fg-link);
      font-size: 13.5px;
      padding: 8px 18px 4px 44px;
      cursor: pointer;
    }

    /* ---------- Robin avatar (original mark, evokes screenshot) ---------- */
    .avatar {
      border-radius: 6px;
      background: linear-gradient(135deg, var(--robin-1), var(--robin-2) 55%, var(--robin-3));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .avatar .dots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 12%;
      width: 58%;
      height: 58%;
    }
    .avatar .dots span {
      background: rgba(255,255,255,0.92);
      border-radius: 1px;
    }
    .avatar .dots span.off { background: transparent; }

    /* ---------- Main content ---------- */
    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: var(--bg-content);
    }
    .chat-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 22px;
      border-bottom: 1px solid #2a2a2a;
    }
    .chat-header .title {
      font-size: 17px;
      font-weight: 600;
      color: var(--fg-strong);
    }
    .chat-header .tabs {
      display: flex;
      gap: 22px;
      margin-left: 6px;
    }
    .chat-header .tab {
      font-size: 14px;
      color: var(--fg-muted);
      padding: 6px 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .chat-header .tab.active {
      color: var(--fg-strong);
      border-bottom-color: #6f6cdf;
    }
    .chat-header-spacer { flex: 1; }
    .chat-header-actions { display: flex; gap: 4px; }

    .simulate-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--robin-1), var(--robin-2));
      color: white;
      border: 0;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(176, 38, 214, 0.35);
    }
    .simulate-btn:hover { filter: brightness(1.06); }
    .simulate-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
    .simulate-btn svg { width: 14px; height: 14px; }

    /* ---------- Thread ---------- */
    .thread {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 18px 32px 22px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .thread::-webkit-scrollbar { width: 10px; }
    .thread::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 999px; }

    .day-divider {
      text-align: center;
      color: var(--fg-faint);
      font-size: 12.5px;
      padding: 18px 0 10px;
      position: relative;
    }

    .msg {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 12px;
      padding: 10px 4px 4px;
    }
    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .msg-meta .who { color: var(--fg-strong); font-weight: 600; font-size: 14px; }
    .msg-meta .when { color: var(--fg-faint); font-size: 12.5px; }
    .msg-text { font-size: 14px; color: var(--fg-default); margin: 4px 0 10px; line-height: 1.45; }

    /* ---------- Booking card ---------- */
    .booking-card {
      background: var(--bg-card);
      border-radius: var(--radius-card);
      padding: 16px 18px;
      max-width: 560px;
      border: 1px solid #333;
    }
    .booking-card.alert {
      border-color: rgba(240, 163, 90, 0.35);
      background: linear-gradient(180deg, rgba(240,163,90,0.06) 0%, var(--bg-card) 60%);
    }
    .booking-card.success {
      border-color: rgba(95, 179, 124, 0.35);
      background: linear-gradient(180deg, rgba(95,179,124,0.07) 0%, var(--bg-card) 60%);
    }
    .booking-card.cancelled { opacity: 0.62; }
    .booking-card.cancelled .bc-title,
    .booking-card.cancelled .bc-time,
    .booking-card.cancelled .bc-room { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.4); }

    .bc-row {
      display: grid;
      grid-template-columns: 1fr 88px;
      gap: 18px;
      align-items: start;
    }
    .bc-title {
      font-size: 15.5px;
      font-weight: 600;
      color: var(--fg-strong);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .bc-time {
      color: var(--fg-default);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .bc-time .arrow { color: var(--fg-muted); }
    .bc-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 32px;
      margin-top: 12px;
    }
    .bc-label { color: var(--fg-muted); font-size: 12.5px; margin-bottom: 2px; }
    .bc-value { color: var(--fg-default); font-size: 14px; }

    .bc-thumb {
      width: 88px;
      height: 70px;
      border-radius: 8px;
      background:
        repeating-linear-gradient(45deg, #2f2f2f 0 8px, #353535 8px 16px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--fg-faint);
    }
    .bc-thumb.photo {
      background: linear-gradient(135deg, #4a3b2e, #2c2218);
      position: relative;
    }
    .bc-thumb.photo::after {
      content: "";
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 30% 35%, rgba(255,200,120,0.25), transparent 50%),
        linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.4));
    }
    .bc-thumb svg { width: 28px; height: 28px; opacity: 0.7; }

    .bc-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .btn {
      background: var(--bg-button);
      border: 1px solid #555;
      color: var(--fg-default);
      padding: 8px 14px;
      border-radius: var(--radius-btn);
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn:hover { background: #353535; border-color: #6a6a6a; }
    .btn.primary {
      background: #4f4dd8;
      border-color: transparent;
      color: white;
      box-shadow: 0 1px 8px rgba(79, 77, 216, 0.35);
    }
    .btn.primary:hover { filter: brightness(1.12); }
    .btn.ghost { background: transparent; border: 0; color: var(--fg-muted); }
    .btn.ghost:hover { color: var(--fg-default); background: transparent; }

    .alert-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px 10px 4px;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--fg-default);
      font-weight: 700;
    }

    .suggest-card {
      background: rgba(0,0,0,0.18);
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 14px 16px;
      margin-top: 14px;
    }
    .suggest-card .label {
      font-size: 12px;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .amenities {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .amenity {
      font-size: 12px;
      padding: 3px 9px;
      border-radius: 999px;
      background: #353535;
      color: var(--fg-default);
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .amenity .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-good);
    }

    /* Typing indicator */
    .typing {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: var(--bg-card);
      border-radius: 16px;
      margin-top: 2px;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--fg-muted);
      animation: blink 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.18s; }
    .typing span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-2px); }
    }

    /* Confirmation banner */
    .ok-banner {
      display: flex; align-items: center; gap: 10px;
      color: var(--accent-good);
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .ok-banner svg { width: 18px; height: 18px; }

    /* Entry animation */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-in { animation: slideIn 0.32s ease-out both; }

    /* ---------- Composer ---------- */
    .composer-wrap {
      padding: 6px 32px 18px;
    }
    .view-prompts {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--fg-muted);
      font-size: 12.5px;
      padding: 4px 0;
      margin-bottom: 6px;
    }
    .view-prompts svg { width: 13px; height: 13px; }
    .composer {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-input);
      border-radius: 8px;
      border-bottom: 2px solid #6f6cdf;
      padding: 4px 6px 4px 14px;
    }
    .composer input {
      flex: 1;
      background: transparent;
      border: 0;
      color: var(--fg-default);
      font-size: 14px;
      padding: 12px 8px;
      outline: none;
      font-family: inherit;
    }
    .composer input::placeholder { color: var(--fg-faint); }
    .composer .send {
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 6px;
      color: var(--fg-muted);
      cursor: pointer;
    }
    .composer .send.active { color: #fff; background: linear-gradient(135deg, var(--robin-1), var(--robin-2)); }

    /* small util */
    .row { display: flex; align-items: center; gap: 8px; }
    .grow { flex: 1; }

    /* Notification dot on sidebar chat row */
    .notif-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e53e3e;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* Toast notification */
    .toast-wrap {
      position: fixed;
      top: 72px;
      right: 20px;
      width: 330px;
      border-radius: 12px;
      overflow: hidden;
      z-index: 9999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      animation: toastIn 0.28s ease-out both;
      cursor: pointer;
      user-select: none;
    }
    .toast-body {
      background: #3e3d7f;
      padding: 14px 12px 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toast-body:hover { background: #44437a; }
    .toast-content { flex: 1; min-width: 0; }
    .toast-name { font-size: 13.5px; font-weight: 700; color: white; margin-bottom: 3px; }
    .toast-preview {
      font-size: 13px;
      color: rgba(255,255,255,0.82);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .toast-dismiss {
      background: none;
      border: 0;
      color: rgba(255,255,255,0.55);
      font-size: 15px;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      cursor: pointer;
      flex-shrink: 0;
      align-self: flex-start;
    }
    .toast-dismiss:hover { background: rgba(255,255,255,0.14); color: white; }
    .toast-reply {
      background: #36357a;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.88);
      font-size: 13.5px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .toast-reply:hover { background: #3c3b85; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(60px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Disable Tweaks panel from interfering visually */
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Components -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="chat-app.jsx"></script>
</body>
</html>
